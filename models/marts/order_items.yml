models:
  - name: order_items
    config:
      contract:
        enforced: true    
    description: Orders overview data mart, offering key details for each unique orders.
    columns:
      - name: order_item_id
        data_type: varchar(250)      
        data_tests:
          - not_null
          - unique
      - name: order_id
        data_type: varchar(250)      
        data_tests:
          - relationships:
              arguments:
                to: ref('orders')
                field: order_id
      - name: IS_DRINK_ITEM
        data_type: BOOLEAN
      - name: IS_FOOD_ITEM
        data_type: BOOLEAN      
      - name: ORDER_DATE
        data_type: DATE         
      - name: PRODUCT_ID
        data_type: varchar(250)      
      - name: PRODUCT_NAME
        data_type: varchar(250)
      - name: PRODUCT_PRICE
        data_type: NUMBER(16,2)      
      - name: SUPPLY_COST
        data_type: NUMBER(16,2)      

    semantic_model:
      enabled: true
      name: order_items
    agg_time_dimension: order_date
    metrics:
      # Simple metrics
      - name: total_expense
        description: The total expense for the business, aggregated from supplier costs
        type: simple
        label: Total Expenses
        agg: sum
        expr: supplier_cost
      - name: total_supplier_revenue
        description: The total net revenue by supplier after discounts and taxes
        type: simple
        label: Total Supplier Revenue
        agg: sum
        expr: net_item_sales_amount
      - name: total_supplier_gross_revenue
        description: The total gross revenue by supplier before discounts and taxes
        type: simple
        label: Total Supplier Gross Revenue
        agg: sum
        expr: gross_item_sales_amount
      - name: total_items_sold
        description: The total number of items sold across all orders
        type: simple
        label: Total Items Sold
        agg: sum
        expr: quantity
      - name: total_gross_sales
        description: The total gross sales amount before discounts and taxes
        type: simple
        label: Total Gross Sales
        agg: sum
        expr: gross_item_sales_amount
      - name: average_gross_sales
        description: The average gross sales amount per order item
        type: simple
        label: Average Gross Sales
        agg: average
        expr: gross_item_sales_amount
      # Derived metrics
      - name: average_items_per_sale
        description: The average number of items per sale, calculated as total items sold divided by total gross sales
        type: ratio
        label: Average Items per Sale
        numerator: total_items_sold
        denominator: total_gross_sales


unit_tests:
  - name: test_supply_costs_sum_correctly
    description: "Test that the supply costs sum correctly by product."
    model: order_items
    given:
      - input: ref('stg_supplies', v='1')
        rows:
          - { supply_uuid: 1, supply_id: 1, product_id: 1, supply_name: "A", supply_cost: 4.50, is_perishable_supply: true }
          - { supply_uuid: 2, supply_id: 2, product_id: 2, supply_name: "B", supply_cost: 3.50, is_perishable_supply: false }
          - { supply_uuid: 3, supply_id: 3, product_id: 2, supply_name: "B", supply_cost: 5.00, is_perishable_supply: false }
      - input: ref('stg_products')
        rows:
          - { product_id: 1 }
          - { product_id: 2 }
      - input: ref('stg_order_items')
        rows:
          - { order_id: 1, product_id: 1, order_item_id: 1 }
          - { order_id: 2, product_id: 2, order_item_id: 2 }
          - { order_id: 2, product_id: 2, order_item_id: 3 }
      - input: ref('stg_orders')
        rows:
          - { order_id: 1 }
          - { order_id: 2 }
    expect:
      rows:
        - { order_id: 1, product_id: 1, supply_cost: 4.50 }
        - { order_id: 2, product_id: 2, supply_cost: 8.50 }
        - { order_id: 2, product_id: 2, supply_cost: 8.50 }
